<!DOCTYPE html><html lang="ja"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f58a0a"><link rel="manifest" href="./manifest.json"><link rel="apple-touch-icon" href="./icon-512.PNG">
<meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>保有資産 | Bitcoin1070 PRO v7.0</title><link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script><script src="https://s3.tradingview.com/tv.js"></script></head><body><header class="app-header"><div class="app-brand">₿ Bitcoin1070 PRO <span>v7.0</span></div><h1>💼 保有資産</h1><p>一覧・構成・推移をまとめて管理</p></header><main class="container app-page">
<section class="card hero-asset"><span class="eyebrow">TOTAL ASSETS</span><h2 id="totalAsset">¥0</h2><p id="assetComment">最新価格を取得中...</p></section>
<section class="action-row"><a class="page-link-button" href="portfolio-edit.html">✏️ 保有資産を編集</a><a class="page-link-button secondary-page-link" href="analysis.html">🧠 保有銘柄を分析</a></section>
<section class="card"><h2>📊 ジャンル別資産</h2><div class="category-summary"><div class="category-box"><span>🪙 仮想通貨</span><strong id="cryptoTotal">¥0</strong></div><div class="category-box"><span>🇯🇵 日本株</span><strong id="jpStockTotal">¥0</strong></div><div class="category-box"><span>🇺🇸 米国株</span><strong id="usStockTotal">¥0</strong></div></div><div class="chart-box"><canvas id="categoryChart"></canvas></div></section>
<section class="card"><h2>📈 資産推移</h2><div class="period-buttons"><button data-days="7">7日</button><button data-days="30">30日</button><button data-days="90">90日</button><button data-days="180">180日</button><button data-days="360">360日</button><button data-days="all">全期間</button></div><div class="history-series-buttons"><button data-series="total" class="active">総資産</button><button data-series="crypto">仮想通貨</button><button data-series="jp">日本株</button><button data-series="us">米国株</button></div><canvas id="assetHistoryChart"></canvas><div class="history-stats"><div class="history-stat"><span>期間の増減</span><strong id="historyChange">--</strong></div><div class="history-stat"><span>期間騰落率</span><strong id="historyRate">--</strong></div><div class="history-stat"><span>最高資産</span><strong id="historyHigh">--</strong></div><div class="history-stat"><span>最低資産</span><strong id="historyLow">--</strong></div></div><p class="small" id="historyStatus">資産データを記録中...</p></section>
<section class="card"><h2>⭐ 監視ダッシュボード</h2><div id="watchDashboard">保有資産を読み込み中...</div></section>
<section class="card"><h2>📋 保有資産一覧</h2><div id="portfolioList"></div></section>
<section class="card"><h2>🥧 資産構成</h2><canvas id="assetChart"></canvas></section>
<section class="card"><h2>🏆 資産ランキング</h2><div id="rankingList">読み込み中...</div></section>
<section class="card"><h2>📒 取引履歴</h2><div id="historyList">まだ履歴はありません</div></section>
</main><nav class="bottom-nav" aria-label="メインメニュー"><a href="index.html" class=""><span>⌂</span><small>ホーム</small></a><a href="market.html" class=""><span>📈</span><small>相場</small></a><a href="portfolio.html" class="active"><span>💼</span><small>資産</small></a><a href="news.html" class=""><span>📰</span><small>情報</small></a><a href="settings.html" class=""><span>⚙️</span><small>設定</small></a></nav><script src="stocks.js"></script><script src="storage.js"></script><script src="chart.js"></script><script src="portfolio.js"></script><script src="analytics.js"></script><script src="monitoring.js"></script><script src="app-shell.js"></script></body></html>
